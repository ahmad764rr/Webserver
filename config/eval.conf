server {
    listen 8080;
    root ./www;
    client_max_body_size 1048576;
    error_page 404 /errors/404.html;
    
    location / {
        methods GET;
        index index.html;
    }
    
    location /upload/ {
        methods GET POST DELETE;
        upload_enable on;
        upload_dir ./www/upload;
    }

    location /cgi-bin/ {
        methods GET POST;
        cgi_extension .py /usr/bin/python3;
        cgi_extension .sh /bin/bash;
    }

    location /redirect/ {
        redirect 301 /;
    }
    
    location /only_delete/ {
        methods DELETE;
    }

    # Route pointing to a different directory (eval item: routes to different directories)
    location /alt/ {
        methods GET;
        root ./www/eval2;
        index index.html;
    }
}

server {
    listen 8080;
    root ./www/eval2;
    client_max_body_size 10;

    location / {
        methods GET;
        index index.html;
    }
}

server {
    listen 8081;
    root ./www/eval3;
    autoindex on;
}