<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 Not Found</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell page-shell--error">
    <section class="hero-card hero-card--error">
      <div class="eyebrow">Not Found</div>
      <h1>404</h1>
      <p class="lead">The requested resource could not be found on this server.</p>
      <div class="status-row">
        <div class="status-pill status-pill--amber">Check the URL</div>
        <div class="status-pill">Static route missing</div>
      </div>
      <a class="action-link" href="/">Return to homepage</a>
    </section>
  </main>
</body>
</html>
