<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 Internal Server Error</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell page-shell--error">
    <section class="hero-card hero-card--error">
      <div class="eyebrow">Server Error</div>
      <h1>500</h1>
      <p class="lead">The server encountered an unexpected condition while processing the request.</p>
      <div class="status-row">
        <div class="status-pill status-pill--red">Something failed</div>
        <div class="status-pill">Retry the request</div>
      </div>
      <a class="action-link" href="/">Return to homepage</a>
    </section>
  </main>
</body>
</html>
